<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: page.title }}">
  <title>{{ page.title }} · Mingfei Ma</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container article">
    <nav class="article-nav">
      <a href="{{ '/' | relative_url }}">&larr; Home</a>
    </nav>

    <header class="article-header">
      {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.date or page.meta %}
      <p class="article-meta">{{ page.date | date: "%B %Y" }}{% if page.meta %} · {{ page.meta }}{% endif %}</p>
      {% endif %}
      {% if page.tagline %}<p class="tagline">{{ page.tagline }}</p>{% endif %}
    </header>

    <article class="prose">
      {{ content }}
    </article>

    <footer>
      <p>&copy; <span id="year"></span> Mingfei Ma</p>
    </footer>
  </main>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
